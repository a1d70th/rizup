<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="brandFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#10b981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ornament: ascending arc (growth/rise-up motif) -->
  <path d="M 28 140 Q 60 40 120 50"
        stroke="url(#brand)" stroke-width="4"
        fill="none" stroke-linecap="round" opacity="0.85"/>
  <circle cx="120" cy="50" r="7" fill="url(#brand)"/>
  <circle cx="120" cy="50" r="14" fill="#06b6d4" opacity="0.2"/>

  <!-- RIZUP wordmark scaled 0.8 from base 384 width -->
  <g fill="url(#brand)" transform="translate(150 24) scale(0.8)">
    <!-- R (x=0) -->
    <rect x="0"  y="0"  width="24" height="140"/>
    <rect x="0"  y="0"  width="60" height="24"/>
    <rect x="0"  y="58" width="60" height="24"/>
    <rect x="56" y="0"  width="24" height="82"/>
    <path d="M 24 82 L 56 82 L 80 140 L 48 140 Z"/>
    <!-- I (x=90) -->
    <rect x="90" y="0" width="24" height="140"/>
    <!-- Z (x=124) -->
    <rect x="124" y="0"   width="80" height="24"/>
    <rect x="124" y="116" width="80" height="24"/>
    <path d="M 180 24 L 204 24 L 148 116 L 124 116 Z"/>
    <!-- U (x=214) -->
    <path d="M 214 0 h 24 v 116 h 32 v -116 h 24 v 140 h -80 z"/>
    <!-- P (x=304) -->
    <rect x="304" y="0"  width="24" height="140"/>
    <rect x="304" y="0"  width="60" height="24"/>
    <rect x="304" y="58" width="60" height="24"/>
    <rect x="360" y="0"  width="24" height="82"/>
  </g>

  <!-- Accent line under wordmark -->
  <rect x="150" y="148" width="310" height="3" rx="1.5" fill="url(#brandFade)"/>

  <!-- Tagline -->
  <text x="150" y="172"
        font-family="'M PLUS Rounded 1c','Hiragino Sans','Yu Gothic UI',sans-serif"
        font-size="13" font-weight="600" fill="#14c4b6" letter-spacing="1">
    株式会社Rizup — 自分に縁する人を、全員輝かせる。
  </text>
</svg>
