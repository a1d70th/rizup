<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep navy background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d1822"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>

    <!-- Brand gradient (matches Header.tsx: #10b981 → #06b6d4) -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- iOS-style rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle atmospheric glow -->
  <ellipse cx="256" cy="80"  rx="280" ry="70" fill="#10b981" opacity="0.10"/>
  <ellipse cx="256" cy="480" rx="240" ry="50" fill="#06b6d4" opacity="0.08"/>

  <!-- RIZUP wordmark -->
  <text x="256" y="296"
        text-anchor="middle"
        font-family="'Inter','SF Pro Display','Helvetica Neue',-apple-system,system-ui,sans-serif"
        font-size="120" font-weight="900" letter-spacing="-3"
        fill="url(#brand)">RIZUP</text>

  <!-- Accent dot (top-right, like a spark) -->
  <circle cx="430" cy="100" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="430" cy="100" r="10" fill="#06b6d4" opacity="0.3"/>
</svg>
