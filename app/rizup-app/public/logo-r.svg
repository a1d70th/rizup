<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="60%" stop-color="#0e9b6f"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- 幾何学的な R（カスタムパス） -->
  <g filter="url(#softShadow)">
    <rect x="140" y="110" width="60" height="292" rx="14" fill="#ffffff"/>
    <path d="M 200 110 L 310 110 Q 392 110 392 200 Q 392 290 310 290 L 200 290 Z" fill="#ffffff"/>
    <path d="M 200 168 L 308 168 Q 336 168 336 200 Q 336 232 308 232 L 200 232 Z" fill="url(#bg)"/>
    <path d="M 272 250 L 408 402 L 340 402 L 208 250 Z" fill="#ffffff"/>
  </g>

  <!-- アクセント -->
  <circle cx="434" cy="80" r="20" fill="#a7f3d0" opacity="0.85"/>
  <circle cx="434" cy="80" r="10" fill="#ffffff"/>
</svg>
