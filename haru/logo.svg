<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <!-- ピンク → 青緑 のブランドグラデ -->
    <linearGradient id="haru-brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFB7C5"/>
      <stop offset="55%"  stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>

    <!-- 桜の花びら用の柔らかいピンクグラデ -->
    <radialGradient id="haru-petal" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFD1DC"/>
      <stop offset="60%"  stop-color="#FFB7C5"/>
      <stop offset="100%" stop-color="#FF91A8"/>
    </radialGradient>

    <!-- 発光用フィルタ -->
    <filter id="haru-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- ① 桜の花びら（HARU ワードマークの左上に配置） -->
  <g transform="translate(40 44)">
    <!-- 5 枚花びら -->
    <g transform="rotate(0)">
      <path d="M 0 -14 Q -6 -10 -5 -2 Q -4 4 0 4 Q 4 4 5 -2 Q 6 -10 0 -14 Z" fill="url(#haru-petal)"/>
    </g>
    <g transform="rotate(72)">
      <path d="M 0 -14 Q -6 -10 -5 -2 Q -4 4 0 4 Q 4 4 5 -2 Q 6 -10 0 -14 Z" fill="url(#haru-petal)"/>
    </g>
    <g transform="rotate(144)">
      <path d="M 0 -14 Q -6 -10 -5 -2 Q -4 4 0 4 Q 4 4 5 -2 Q 6 -10 0 -14 Z" fill="url(#haru-petal)"/>
    </g>
    <g transform="rotate(216)">
      <path d="M 0 -14 Q -6 -10 -5 -2 Q -4 4 0 4 Q 4 4 5 -2 Q 6 -10 0 -14 Z" fill="url(#haru-petal)"/>
    </g>
    <g transform="rotate(288)">
      <path d="M 0 -14 Q -6 -10 -5 -2 Q -4 4 0 4 Q 4 4 5 -2 Q 6 -10 0 -14 Z" fill="url(#haru-petal)"/>
    </g>
    <!-- 中心ドット -->
    <circle r="2.2" fill="#FF6B9D"/>
  </g>

  <!-- ② メインワードマーク "HARU" -->
  <text x="70" y="88"
        font-family="'Inter','SF Pro Display','Helvetica Neue',-apple-system,system-ui,sans-serif"
        font-size="66" font-weight="900" letter-spacing="-2"
        fill="url(#haru-brand)">HARU</text>

  <!-- ③ アクセント：光の帯 -->
  <rect x="72" y="104" width="196" height="2" rx="1" fill="url(#haru-brand)" opacity="0.5"/>

  <!-- ④ サブテキスト "하루"（ハングル・小さめ） -->
  <text x="72" y="134"
        font-family="'Noto Sans KR','Noto Sans JP',sans-serif"
        font-size="18" font-weight="700" letter-spacing="3"
        fill="#FF6B9D">하루</text>

  <!-- ⑤ Ornament: 小さな桜の花びら（右下） -->
  <g transform="translate(268 138)">
    <circle r="3" fill="#FFD1DC"/>
    <circle r="6" fill="#FFB7C5" opacity="0.3"/>
  </g>
</svg>
